<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- FIX FOR HOME SCREEN ICON (No grey box) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JMJ Calc">
    
    <!-- Crucial tags for the logo to show on your wallpaper -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>Jai Mata Ji Marble & Granite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f9fafb; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Make numbers very readable */
        input { font-size: 1.25rem !important; }
        .big-text { font-size: 1.1rem; }
        .label-text { font-size: 1rem; font-weight: 800; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center">

    <!-- Header Banner - Logo only on Left -->
    <div class="w-full py-6 px-5 flex flex-col items-center shadow-lg"
        style="background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 60%, #ef5350 100%)">
        <div class="w-full max-w-md flex items-center justify-start gap-4 mb-2">
            <!-- Left Logo Only -->
            <img src="icon.png" 
                 style="width: 60px; height: 60px; border-radius: 12px; border: 2px solid white; background: white; object-fit: contain; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            
            <div class="text-left">
                <h1 class="text-white font-black text-2xl leading-tight tracking-tight">JAI MATA JI</h1>
                <p class="text-red-100 text-base font-bold leading-tight">Marble & Granite House</p>
            </div>
        </div>
        <div class="w-full max-w-md mt-2">
            <span class="bg-white/20 rounded-lg px-3 py-1 text-white text-xs font-black tracking-widest uppercase">
                Granite Profit Calculator
            </span>
        </div>
    </div>

    <!-- Main Card -->
    <div class="w-full max-w-md px-4 mt-6 mb-10">
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100">

            <!-- Granite Type Selector -->
            <div class="mb-6">
                <label class="block label-text text-gray-900 mb-2">Granite Type (पत्थर चुनें)</label>
                <div class="flex gap-4">
                    <button id="btnSouth" onclick="setType('South')" class="flex-1 py-4 px-4 rounded-2xl border-2 font-black text-lg transition-all duration-200 border-red-600 bg-red-600 text-white shadow-md">
                        South
                        <span class="block text-xs font-normal opacity-90">Factor: 0.82</span>
                    </button>
                    <button id="btnRaj" onclick="setType('Rajasthan')" class="flex-1 py-4 px-4 rounded-2xl border-2 font-black text-lg transition-all duration-200 border-gray-200 bg-gray-50 text-gray-600">
                        Rajasthan
                        <span class="block text-xs font-normal opacity-70">Factor: 0.75</span>
                    </button>
                </div>
            </div>

            <!-- Inputs - LARGER FONT -->
            <div class="space-y-5">
                <div>
                    <label class="block label-text text-gray-900 mb-1.5">Total Feet (कुल फीट)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl">📐</span>
                        <input type="number" id="totalFeet" inputmode="decimal" placeholder="जैसे: 250" class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-gray-200 focus:border-red-600 focus:outline-none text-gray-900 font-bold bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="block label-text text-gray-900 mb-1.5">Cost Rate (खरीदी ₹)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-black text-xl">₹</span>
                        <input type="number" id="costPrice" inputmode="decimal" placeholder="जैसे: 120" class="w-full pl-10 pr-4 py-4 rounded-2xl border-2 border-gray-200 focus:border-red-600 focus:outline-none text-gray-900 font-bold bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="block label-text text-gray-900 mb-1.5">Selling Rate (बिक्री ₹)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-black text-xl">₹</span>
                        <input type="number" id="sellingPrice" inputmode="decimal" placeholder="जैसे: 150" class="w-full pl-10 pr-4 py-4 rounded-2xl border-2 border-gray-200 focus:border-red-600 focus:outline-none text-gray-900 font-bold bg-gray-50 focus:bg-white transition-all">
                    </div>
                </div>
            </div>

            <div id="errorBox" class="hidden mt-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm font-bold"></div>

            <button onclick="calculate()" class="w-full mt-8 py-5 rounded-2xl text-white font-black text-2xl tracking-widest shadow-xl transition-all active:scale-95" 
                    style="background: linear-gradient(135deg, #d32f2f, #b71c1c)">
                CALCULATE
            </button>
        </div>

        <!-- Result Section - EXTREMELY READABLE -->
        <div id="resultsArea" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div id="statusCard" class="mt-6 rounded-3xl border-4 p-6 shadow-lg">
                <div class="flex items-center justify-between mb-5">
                    <h2 id="statusLabel" class="font-black text-2xl uppercase italic"></h2>
                    <span id="typeBadge" class="text-xs font-black px-3 py-1 rounded-lg"></span>
                </div>
                
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-700 font-bold text-lg">Profit per Ft</span>
                        <span id="resProfitPerFoot" class="font-black text-2xl"></span>
                    </div>
                    <div class="border-t-2 border-dashed border-gray-300"></div>
                    <div>
                        <span id="resTotalLabel" class="text-gray-800 font-black text-xl block mb-1"></span>
                        <span id="resTotalProfit" class="font-black text-5xl tracking-tighter block mb-1"></span>
                        <span id="resBreakdown" class="text-sm font-bold opacity-60 italic"></span>
                    </div>
                </div>

                <div class="mt-6 pt-5 border-t border-gray-200">
                    <button onclick="handleShare()" id="shareBtn" class="w-full py-4 rounded-2xl border-2 border-gray-300 bg-white text-gray-800 font-black text-lg flex items-center justify-center gap-2 shadow-sm active:bg-gray-100">
                        📋 SHARE QUOTE
                    </button>
                </div>
            </div>

            <!-- Min Price Warning -->
            <div class="mt-5 rounded-3xl border-2 p-5 bg-amber-50 border-amber-400 shadow-sm">
                <p class="font-black text-amber-900 text-sm uppercase tracking-widest mb-2">⚠️ Minimum Selling Price</p>
                <div class="flex items-center justify-between bg-white rounded-2xl px-5 py-4 border-2 border-amber-200">
                    <span id="minPriceCalc" class="text-amber-800 font-bold text-lg"></span>
                    <span id="resMinSellingPrice" class="font-black text-3xl text-amber-900"></span>
                </div>
                <p class="text-[11px] text-amber-700 mt-2 font-bold text-center italic">इससे नीचे बिक्री पर नुकसान होगा!</p>
            </div>
        </div>
    </div>

    <script>
        let graniteType = "South";

        function setType(type) {
            graniteType = type;
            const btnS = document.getElementById('btnSouth');
            const btnR = document.getElementById('btnRaj');
            if(type === 'South') {
                btnS.className = "flex-1 py-4 px-4 rounded-2xl border-2 font-black text-lg transition-all border-red-600 bg-red-600 text-white shadow-md";
                btnR.className = "flex-1 py-4 px-4 rounded-2xl border-2 font-black text-lg transition-all border-gray-200 bg-gray-50 text-gray-600";
            } else {
                btnR.className = "flex-1 py-4 px-4 rounded-2xl border-2 font-black text-lg transition-all border-red-600 bg-red-600 text-white shadow-md";
                btnS.className = "flex-1 py-4 px-4 rounded-2xl border-2 font-black text-lg transition-all border-gray-200 bg-gray-50 text-gray-600";
            }
        }

        function calculate() {
            const err = document.getElementById('errorBox');
            err.classList.add('hidden');
            
            const feet = parseFloat(document.getElementById('totalFeet').value);
            const cost = parseFloat(document.getElementById('costPrice').value);
            const sell = parseFloat(document.getElementById('sellingPrice').value);

            if (isNaN(feet) || feet <= 0 || isNaN(cost) || cost <= 0 || isNaN(sell) || sell <= 0) {
                err.innerText = "⚠️ Fill all fields / सब कुछ भरें!";
                err.classList.remove('hidden');
                return;
            }

            const factor = graniteType === "Rajasthan" ? 0.75 : 0.82;
            const minSellingPrice = factor * cost;
            const profitPerFoot = sell - minSellingPrice;
            const totalProfit = feet * profitPerFoot;
            const isProfit = totalProfit >= 0;

            document.getElementById('resultsArea').classList.remove('hidden');
            const card = document.getElementById('statusCard');
            const label = document.getElementById('statusLabel');
            const badge = document.getElementById('typeBadge');

            card.style.background = isProfit ? "#f0fdf4" : "#fff1f2";
            card.style.borderColor = isProfit ? "#16a34a" : "#dc2626";
            
            label.innerText = isProfit ? "✅ PROFIT(लाभ)" : "❌ LOSS(हानी)";
            label.style.color = isProfit ? "#15803d" : "#b91c1c";
            
            badge.innerText = graniteType;
            badge.style.background = isProfit ? "#dcfce7" : "#fee2e2";
            badge.style.color = isProfit ? "#15803d" : "#b91c1c";

            document.getElementById('resProfitPerFoot').innerText = "₹" + profitPerFoot.toFixed(2);
            document.getElementById('resProfitPerFoot').style.color = isProfit ? "#15803d" : "#b91c1c";

            document.getElementById('resTotalLabel').innerText = "TOTAL " + (isProfit ? "PROFIT" : "LOSS");
            document.getElementById('resBreakdown').innerText = feet + " ft × ₹" + profitPerFoot.toFixed(2);
            
            const totalDisplay = document.getElementById('resTotalProfit');
            totalDisplay.innerText = "₹" + Math.abs(totalProfit).toLocaleString('en-IN', {maximumFractionDigits: 2});
            totalDisplay.style.color = isProfit ? "#15803d" : "#b91c1c";

            document.getElementById('minPriceCalc').innerText = factor + " × ₹" + cost + " =";
            document.getElementById('resMinSellingPrice').innerText = "₹" + minSellingPrice.toFixed(2);

            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function handleShare() {
            const ft = document.getElementById('totalFeet').value;
            const total = document.getElementById('resTotalProfit').innerText;
            const isP = document.getElementById('statusLabel').innerText.includes('PROFIT');
            const status = isP ? "PROFIT (फायदा)" : "LOSS (नुकसान)";

            const text = `🪨 JAI MATA JI MARBLE & GRANITE\n───────────────────\nType: ${graniteType}\nQty: ${ft} sq.ft.\n───────────────────\nTotal ${status}: ${total}\n───────────────────`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('shareBtn');
                btn.innerText = "✅ COPIED TO CLIPBOARD";
                setTimeout(() => btn.innerText = "📋 SHARE QUOTE", 2000);
            });
        }
    </script>
</body>
</html>
