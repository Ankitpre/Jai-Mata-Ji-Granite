<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- HOME SCREEN ICON CODE (Fixes the boring G) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JMJ Calc">
    
    <!-- This links to the icon.png you upload to GitHub -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Jai Mata Ji Granite','short_name':'JMJ Calc','start_url':'.','display':'standalone','background_color':'#d32f2f','theme_color':'#d32f2f','icons':[{'src':'icon.png','sizes':'192x192','type':'image/png'}]}">

    <title>Jai Mata Ji Marble & Granite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f9fafb; 
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .header-bg {
            background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 60%, #ef5350 100%);
        }
        /* Style for your centered logo */
        .app-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center pb-10">

    <!-- New Header with Centered Logo -->
    <div id="header" class="w-full py-10 px-4 flex flex-col items-center shadow-md header-bg pt-14 rounded-b-[40px]">
        <div class="flex flex-col items-center gap-3">
            <!-- This will display your icon.png as the main logo -->
            <img src="icon.png" class="app-logo" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2603/2603741.png'">
            
            <div class="text-center">
                <h1 class="text-white font-black text-3xl tracking-tighter italic uppercase leading-none">JAI MATA JI</h1>
                <p class="text-red-100 text-[10px] font-bold tracking-[0.3em] uppercase mt-2">Marbles & Granite House</p>
            </div>
        </div>
        
        <div class="mt-5 bg-black/20 backdrop-blur-sm rounded-full px-6 py-1 border border-white/10">
            <p class="text-white text-[9px] font-black tracking-widest uppercase">Premium Calculator</p>
        </div>
    </div>

    <!-- Main Calculator Interface -->
    <div class="w-full max-w-md px-4 -mt-6">
        <div class="bg-white rounded-[40px] shadow-xl p-7 border border-gray-100">
            
            <!-- Type Selector -->
            <div class="mb-6 flex gap-3">
                <button id="btnSouth" onclick="setGraniteType('South')" class="flex-1 py-4 rounded-2xl border-2 font-black text-sm transition-all border-red-600 bg-red-600 text-white">
                    SOUTH<br><span class="text-[9px] font-normal opacity-80 uppercase">0.82 Factor</span>
                </button>
                <button id="btnRajasthan" onclick="setGraniteType('Rajasthan')" class="flex-1 py-4 rounded-2xl border-2 font-black text-sm transition-all border-gray-100 bg-gray-50 text-gray-400">
                    RAJASTHAN<br><span class="text-[9px] font-normal opacity-80 uppercase">0.75 Factor</span>
                </button>
            </div>

            <!-- Inputs -->
            <div class="space-y-4">
                <div class="bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-red-500 transition-all">
                    <label class="block font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-1 text-center">Measurement (Sq.Ft.)</label>
                    <input type="number" id="totalFeet" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-2xl font-bold outline-none text-gray-800 text-center">
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-red-500 transition-all">
                    <label class="block font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-1 text-center">Cost Rate (खरीदी)</label>
                    <input type="number" id="costPrice" inputmode="decimal" placeholder="0.00" class="w-full bg-transparent text-2xl font-bold outline-none text-gray-800 text-center">
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-red-500 transition-all">
                    <label class="block font-bold text-gray-400 text-[10px] uppercase tracking-widest mb-1 text-center">Selling Rate (बिक्री)</label>
                    <input type="number" id="sellingPrice" inputmode="decimal" placeholder="0.00" class="w-full bg-transparent text-2xl font-bold outline-none text-gray-800 text-center">
                </div>
            </div>

            <button onclick="handleCalculate()" class="w-full mt-8 py-5 rounded-2xl text-white font-black text-xl tracking-widest shadow-lg active:scale-95 transition-all" style="background: linear-gradient(135deg, #d32f2f, #b71c1c)">
                CALCULATE
            </button>
        </div>

        <!-- Result Section -->
        <div id="resultsArea" class="hidden mt-6 animate-in fade-in slide-in-from-bottom-4">
            <div id="statusCard" class="rounded-[40px] border-4 p-8 bg-white shadow-sm">
                <div class="flex items-center justify-between mb-8">
                    <h2 id="statusLabel" class="font-black italic text-2xl uppercase tracking-tighter"></h2>
                    <span id="typeBadge" class="text-[9px] font-black px-4 py-1.5 rounded-full uppercase bg-black text-white"></span>
                </div>
                
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-[10px] uppercase">Total Profit/Loss</span>
                        <span id="resTotalProfit" class="font-black text-4xl tracking-tighter"></span>
                    </div>
                    <div class="border-t border-gray-100 pt-4">
                        <div class="flex justify-between items-center bg-amber-50 rounded-2xl p-4 border border-amber-100">
                            <span class="text-amber-800 font-bold text-[9px] uppercase">Min Selling Rate</span>
                            <span id="resMinSellingPrice" class="text-xl font-black text-amber-900"></span>
                        </div>
                    </div>
                </div>

                <button onclick="handleShare()" class="w-full mt-8 py-4 rounded-2xl border-2 border-gray-100 bg-white text-gray-400 font-bold text-sm flex items-center justify-center gap-2">
                    📋 Copy WhatsApp Quote
                </button>
            </div>
        </div>

        <!-- Professional Footer -->
        <div class="mt-12 text-center opacity-30 px-10">
            <p class="text-[8px] font-black uppercase tracking-[0.3em] leading-loose">
                Kansana Kothi, Patri Road, Gwalior (M.P.)<br>
                GSTIN: 23BHAPR7189B1ZD
            </p>
        </div>
    </div>

    <script>
        let graniteType = "South";

        function setGraniteType(type) {
            graniteType = type;
            const btnS = document.getElementById('btnSouth');
            const btnR = document.getElementById('btnRajasthan');
            if(type === 'South') {
                btnS.className = "flex-1 py-4 rounded-2xl border-2 font-black text-sm transition-all border-red-600 bg-red-600 text-white";
                btnR.className = "flex-1 py-4 rounded-2xl border-2 font-black text-sm transition-all border-gray-100 bg-gray-50 text-gray-400";
            } else {
                btnR.className = "flex-1 py-4 rounded-2xl border-2 font-black text-sm transition-all border-red-600 bg-red-600 text-white";
                s.className = "flex-1 py-4 rounded-2xl border-2 font-black text-sm transition-all border-gray-100 bg-gray-50 text-gray-400";
            }
        }

        function handleCalculate() {
            const feet = parseFloat(document.getElementById('totalFeet').value) || 0;
            const cost = parseFloat(document.getElementById('costPrice').value) || 0;
            const sell = parseFloat(document.getElementById('sellingPrice').value) || 0;
            const factor = graniteType === "Rajasthan" ? 0.75 : 0.82;
            
            const minSellingPrice = factor * cost;
            const profitPerFoot = sell - minSellingPrice;
            const totalProfit = feet * profitPerFoot;

            document.getElementById('resultsArea').classList.remove('hidden');
            const isProfit = totalProfit >= 0;
            const card = document.getElementById('statusCard');
            
            card.style.borderColor = isProfit ? "#10b981" : "#ef4444";
            document.getElementById('statusLabel').innerText = isProfit ? "Fayda (Profit)" : "Nuksan (Loss)";
            document.getElementById('statusLabel').style.color = isProfit ? "#059669" : "#dc2626";
            document.getElementById('resTotalProfit').innerText = "₹" + Math.abs(totalProfit).toLocaleString('en-IN', {maximumFractionDigits: 0});
            document.getElementById('resTotalProfit').style.color = isProfit ? "#059669" : "#dc2626";
            document.getElementById('resMinSellingPrice').innerText = "₹" + minSellingPrice.toFixed(2);
            document.getElementById('typeBadge').innerText = graniteType;

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function handleShare() {
            const ft = document.getElementById('totalFeet').value;
            const total = document.getElementById('resTotalProfit').innerText;
            const text = `*JAI MATA JI MARBLES*\n*Qty:* ${ft} sq.ft\n*Stone:* ${graniteType}\n*Total:* ${total}\n------------------\n_Sent via JMJ App_`;
            navigator.clipboard.writeText(text).then(() => alert("Quote Copied!"));
        }
    </script>
</body>
</html>
