<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jai Mata Ji Granite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .jmj-red { background-color: #d32f2f; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-box { border: 2px solid #f1f5f9; border-radius: 16px; padding: 12px; transition: 0.3s; }
        .input-box:focus-within { border-color: #d32f2f; }
        .btn-calc { background: #d32f2f; color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: 800; }
        .type-btn { border: 2px solid #f1f5f9; border-radius: 16px; padding: 12px; text-align: center; flex: 1; }
        .type-btn.active { border-color: #d32f2f; background: #fff5f5; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body class="pb-10">

    <div class="jmj-red text-white pt-12 pb-20 px-6 text-center rounded-b-[40px]">
        <h1 class="text-2xl font-black uppercase italic">Jai Mata Ji</h1>
        <p class="text-[10px] opacity-80 tracking-widest font-bold">MARBLE & GRANITE HOUSE</p>
    </div>

    <div class="card -mt-10 mx-5 p-6">
        <div class="flex gap-3 mb-6">
            <button id="btnSouth" onclick="setType('South', 0.82)" class="type-btn active">SOUTH<br><span class="text-[9px] opacity-50 font-normal">0.82 Factor</span></button>
            <button id="btnRaj" onclick="setType('Rajasthan', 0.75)" class="type-btn">RAJASTHAN<br><span class="text-[9px] opacity-50 font-normal">0.75 Factor</span></button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Total Feet</label>
                <div class="input-box flex items-center"><span class="mr-2">📐</span><input type="number" id="feet" class="w-full outline-none font-bold" placeholder="0" inputmode="decimal"></div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Cost Rate (खरीदी)</label>
                <div class="input-box flex items-center"><span class="mr-2">₹</span><input type="number" id="cost" class="w-full outline-none font-bold" placeholder="0" inputmode="decimal"></div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Selling Rate (बिक्री)</label>
                <div class="input-box flex items-center"><span class="mr-2">💰</span><input type="number" id="sell" class="w-full outline-none font-bold" placeholder="0" inputmode="decimal"></div>
            </div>
        </div>

        <button onclick="calculate()" class="btn-calc mt-8 uppercase tracking-widest active:scale-95 transition-transform">Calculate</button>
    </div>

    <div id="results" class="hidden mx-5 mt-6 space-y-4">
        <div id="statusCard" class="p-6 border-2 bg-white rounded-[24px]">
            <div class="flex justify-between items-center mb-4">
                <span id="statusLabel" class="font-black italic uppercase"></span>
                <span id="typeBadge" class="bg-black text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase"></span>
            </div>
            <div class="flex justify-between items-center py-2 border-b border-gray-50">
                <span class="text-gray-400 font-bold text-[10px]">PROFIT / FT</span>
                <span id="resPerFoot" class="font-bold"></span>
            </div>
            <div class="flex justify-between items-center pt-4">
                <span class="text-gray-400 font-bold text-[10px]">TOTAL PROFIT</span>
                <span id="resTotal" class="text-4xl font-black"></span>
            </div>
        </div>

        <div class="p-5 border-2 border-orange-100 bg-orange-50 rounded-[24px]">
            <p class="text-[10px] text-orange-800 font-black uppercase mb-1">⚠️ Minimum Selling Price</p>
            <div class="bg-white p-3 rounded-xl flex justify-between items-center border border-orange-100">
                <span id="minFormula" class="text-gray-300 font-mono text-[10px]"></span>
                <span id="minPriceVal" class="text-2xl font-black text-orange-600"></span>
            </div>
        </div>
    </div>

    <div class="text-center mt-10 opacity-30 px-10">
        <p class="text-[8px] font-bold uppercase tracking-widest leading-loose">Kansana Kothi, Patri Road, Gwalior (M.P.)</p>
    </div>

    <script>
        let currentFactor = 0.82;
        let currentType = 'South';

        function setType(type, factor) {
            currentType = type;
            currentFactor = factor;
            document.getElementById('btnSouth').className = type === 'South' ? 'type-btn active' : 'type-btn';
            document.getElementById('btnRaj').className = type === 'Rajasthan' ? 'type-btn active' : 'type-btn';
        }

        function calculate() {
            const feet = parseFloat(document.getElementById('feet').value) || 0;
            const cost = parseFloat(document.getElementById('cost').value) || 0;
            const sell = parseFloat(document.getElementById('sell').value) || 0;

            const minPrice = currentFactor * cost;
            const profitPerFt = sell - minPrice;
            const totalProfit = feet * profitPerFt;

            document.getElementById('results').classList.remove('hidden');
            document.getElementById('typeBadge').innerText = currentType;
            document.getElementById('resPerFoot').innerText = '₹' + profitPerFt.toFixed(2);
            document.getElementById('resTotal').innerText = '₹' + totalProfit.toLocaleString('en-IN');
            document.getElementById('minFormula').innerText = currentFactor + ' × ' + cost;
            document.getElementById('minPriceVal').innerText = '₹' + minPrice.toFixed(2);

            const card = document.getElementById('statusCard');
            const label = document.getElementById('statusLabel');
            const totalDisp = document.getElementById('resTotal');

            if(totalProfit >= 0) {
                card.style.borderColor = '#16a34a';
                label.innerText = 'Profit (फायदा)';
                label.style.color = '#16a34a';
                totalDisp.style.color = '#16a34a';
            } else {
                card.style.borderColor = '#dc2626';
                label.innerText = 'Loss (नुकसान)';
                label.style.color = '#dc2626';
                totalDisp.style.color = '#dc2626';
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
